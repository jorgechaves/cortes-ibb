<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <title>Cortes IBB</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f5f4;
      --panel: #ffffff;
      --ink: #1c1917;
      --muted: #78716c;
      --line: #e7e5e4;
      --accent: #1e40af;
      --accent-2: #2563eb;
      --ok: #15803d;
      --warn: #b45309;
      --warn-bg: #fef3c7;
      --err: #b91c1c;
      --err-bg: #fee2e2;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }
    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }
    h1 {
      margin: 0 0 4px;
      font-size: 28px;
      letter-spacing: -0.01em;
    }
    .sub { color: var(--muted); margin: 0 0 32px; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .dropzone {
      border: 2px dashed #d6d3d1;
      border-radius: 16px;
      padding: 56px 24px;
      text-align: center;
      background: #fafaf9;
      transition: border-color .15s, background .15s;
      cursor: pointer;
      user-select: none;
    }
    .dropzone.hover {
      border-color: var(--accent);
      background: #eff6ff;
    }
    .dropzone.disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .dropzone strong { display: block; font-size: 18px; margin-bottom: 4px; }
    .dropzone span { color: var(--muted); font-size: 14px; }
    input[type="file"] { display: none; }
    .progress-wrap {
      display: none;
    }
    .progress-wrap.show { display: block; }
    .bar {
      background: #e7e5e4;
      border-radius: 999px;
      overflow: hidden;
      height: 14px;
      margin: 12px 0 8px;
    }
    .bar > div {
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      height: 100%;
      width: 0%;
      transition: width .25s ease;
    }
    .stage-label {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      color: var(--muted);
    }
    .log {
      margin-top: 16px;
      max-height: 220px;
      overflow: auto;
      background: #0c0a09;
      color: #e7e5e4;
      font: 12px/1.55 ui-monospace, "SF Mono", Menlo, monospace;
      padding: 12px 14px;
      border-radius: 8px;
    }
    .log .ts { color: #78716c; margin-right: 6px; }
    .log .err { color: #fca5a5; }
    .log .warn { color: #fde047; }
    .banner {
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
    }
    .banner.warn { background: var(--warn-bg); color: var(--warn); }
    .banner.err  { background: var(--err-bg);  color: var(--err); }
    .results { display: none; }
    .results.show { display: block; }
    .cut {
      border-top: 1px solid var(--line);
      padding: 14px 0;
    }
    .cut:first-child { border-top: 0; padding-top: 0; }
    .cut .head {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 2px;
    }
    .cut .idx { color: var(--muted); font-variant-numeric: tabular-nums; }
    .cut .title { font-weight: 600; font-size: 16px; }
    .cut .rat { color: var(--muted); font-style: italic; font-size: 14px; }
    .cut .meta {
      display: flex;
      gap: 12px;
      margin-top: 6px;
      font-size: 13px;
      color: var(--muted);
    }
    .cut .meta a { color: var(--accent-2); text-decoration: none; }
    .cut .meta a:hover { text-decoration: underline; }
    .ig {
      margin-top: 10px;
      background: #fafaf9;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px 14px;
    }
    .ig-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .ig-head strong { font-size: 13px; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; }
    .ig-hook { font-weight: 600; font-size: 15px; margin: 6px 0; }
    .ig-caption { font-size: 14px; white-space: pre-wrap; margin: 6px 0; }
    .ig-cta { font-size: 14px; font-style: italic; color: var(--muted); margin: 6px 0; }
    .ig-tags { font-size: 13px; color: var(--accent-2); word-break: break-word; }
    .copy-btn {
      font: inherit;
      font-size: 12px;
      background: var(--ink);
      color: white;
      border: 0;
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
    }
    .copy-btn.ok { background: var(--ok); }
    button {
      font: inherit;
      background: #1c1917;
      color: white;
      border: 0;
      border-radius: 8px;
      padding: 8px 14px;
      cursor: pointer;
    }
    button.ghost {
      background: transparent;
      color: var(--muted);
      padding: 6px 10px;
    }
    button.ghost:hover { color: var(--ink); }
    footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Cortes IBB</h1>
    <p class="sub">Arraste o vídeo. O app gera 6 cortes (~60s) com legendas, ícone, cartão final e envia ao Drive.</p>

    <div id="banners"></div>

    <div class="panel">
      <div id="dropzone" class="dropzone">
        <strong>Arraste o vídeo aqui</strong>
        <span>ou clique para selecionar (.mp4, .mov, .m4v)</span>
        <input id="filepicker" type="file" accept="video/*" />
      </div>

      <div id="progress-wrap" class="progress-wrap">
        <div class="bar"><div id="bar-fill"></div></div>
        <div class="stage-label">
          <span id="stage-text">Aguardando...</span>
          <span id="percent-text">0%</span>
        </div>
        <div id="log" class="log"></div>
      </div>
    </div>

    <div id="results" class="panel results">
      <h2 style="margin:0 0 12px;font-size:18px;">Cortes prontos</h2>
      <div id="cuts"></div>
    </div>

    <footer>
      <button class="ghost" id="shutdown">Encerrar app</button>
    </footer>
  </main>

  <script>
    const dropzone = document.getElementById('dropzone');
    const picker = document.getElementById('filepicker');
    const progressWrap = document.getElementById('progress-wrap');
    const barFill = document.getElementById('bar-fill');
    const stageText = document.getElementById('stage-text');
    const percentText = document.getElementById('percent-text');
    const logEl = document.getElementById('log');
    const banners = document.getElementById('banners');
    const resultsPanel = document.getElementById('results');
    const cutsEl = document.getElementById('cuts');

    let processing = false;
    let eventSource = null;

    function setBanner(kind, text) {
      const div = document.createElement('div');
      div.className = `banner ${kind}`;
      div.textContent = text;
      banners.appendChild(div);
    }

    function clearBanners() { banners.innerHTML = ''; }

    function log(msg, level) {
      const ts = new Date().toLocaleTimeString();
      const line = document.createElement('div');
      const span = document.createElement('span');
      span.className = 'ts';
      span.textContent = ts;
      line.appendChild(span);
      const body = document.createElement('span');
      if (level) body.className = level;
      body.textContent = msg;
      line.appendChild(body);
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function setProgress(percent, stage) {
      const p = Math.max(0, Math.min(100, percent || 0));
      barFill.style.width = p.toFixed(1) + '%';
      percentText.textContent = p.toFixed(0) + '%';
      if (stage) stageText.textContent = stage;
    }

    function setProcessing(yes) {
      processing = yes;
      dropzone.classList.toggle('disabled', yes);
    }

    function startUpload(file) {
      if (processing) {
        log('Aguarde o processo atual terminar.', 'warn');
        return;
      }
      if (!file.type.startsWith('video/')) {
        setBanner('err', 'Tipo de arquivo não suportado: ' + (file.type || file.name));
        return;
      }

      clearBanners();
      resultsPanel.classList.remove('show');
      cutsEl.innerHTML = '';
      logEl.innerHTML = '';
      progressWrap.classList.add('show');
      setProcessing(true);
      setProgress(2, `Enviando ${file.name}…`);
      log(`Upload de ${file.name} (${(file.size / 1_000_000).toFixed(1)} MB)`);

      const form = new FormData();
      form.append('video', file);

      fetch('/upload', { method: 'POST', body: form })
        .then(async (r) => {
          if (!r.ok) {
            const text = await r.text();
            throw new Error(`HTTP ${r.status}: ${text}`);
          }
          return r.json();
        })
        .then(() => openStream())
        .catch((e) => {
          setBanner('err', 'Falha no upload: ' + e.message);
          setProcessing(false);
          progressWrap.classList.remove('show');
        });
    }

    function openStream() {
      if (eventSource) eventSource.close();
      eventSource = new EventSource('/events');
      eventSource.onmessage = (ev) => {
        let data;
        try { data = JSON.parse(ev.data); } catch (e) { return; }
        handleEvent(data);
      };
      eventSource.onerror = () => {
        // EventSource auto-reconnects unless we close
      };
    }

    function handleEvent(ev) {
      if (ev.type === 'progress') {
        const stage = ev.stage || '';
        const msg = ev.message || stageLabel(stage, ev);
        setProgress(ev.percent || 0, msg);
      } else if (ev.type === 'stage') {
        setProgress(ev.percent || 0, ev.message || stageLabel(ev.stage));
        log(ev.message || `Iniciando ${ev.stage}`);
      } else if (ev.type === 'log') {
        log(`[${ev.stage}] ${ev.message}`);
      } else if (ev.type === 'done') {
        setProgress(100, 'Concluído');
        log('Pipeline finalizado.');
        renderResults(ev.data || {});
        setProcessing(false);
        if (eventSource) eventSource.close();
      } else if (ev.type === 'error') {
        log(ev.message, 'err');
        setBanner('err', 'Erro: ' + ev.message);
        setProcessing(false);
        if (eventSource) eventSource.close();
      }
    }

    function stageLabel(stage, ev) {
      const map = {
        upload: 'Enviando',
        probe: 'Inspecionando',
        transcribe: 'Transcrevendo',
        select: 'Selecionando cortes',
        ass: 'Gerando legendas',
        outro: 'Renderizando logo final',
        render: 'Renderizando cortes',
        concat: 'Finalizando MP4s',
        instagram: 'Gerando legendas Instagram',
        drive: 'Enviando ao Drive',
        done: 'Concluído',
      };
      if (stage === 'render' && ev && ev.cut_idx) {
        const sub = Math.round((ev.sub_fraction || 0) * 100);
        return `Renderizando corte ${ev.cut_idx} de ${ev.cut_total} — ${sub}%`;
      }
      if (stage === 'drive' && ev && ev.file_idx) {
        return `Enviando arquivo ${ev.file_idx} de ${ev.file_total}`;
      }
      return map[stage] || stage;
    }

    function renderResults(data) {
      if (data.fallback_reason || data.selection_mode === 'heuristic') {
        setBanner('warn', `Seleção semântica indisponível (motivo: ${data.fallback_reason || 'desconhecido'}). Usando heurística.`);
      }
      if (data.drive_error) {
        setBanner('warn', `Upload ao Drive falhou: ${data.drive_error}. Arquivos locais preservados em ${data.out_dir}.`);
      }
      if (data.instagram_skipped) {
        setBanner('warn', `Legendas Instagram não geradas — motivo: ${data.instagram_skip_reason || 'desconhecido'}.`);
      }
      resultsPanel.classList.add('show');
      cutsEl.innerHTML = '';
      (data.cuts || []).forEach((c) => {
        const item = document.createElement('div');
        item.className = 'cut';
        const head = document.createElement('div');
        head.className = 'head';
        head.innerHTML = `<span class="idx">${c.idx}.</span><span class="title"></span>`;
        head.querySelector('.title').textContent = c.title || c.slug;
        item.appendChild(head);
        if (c.rationale) {
          const r = document.createElement('div');
          r.className = 'rat';
          r.textContent = c.rationale;
          item.appendChild(r);
        }
        const meta = document.createElement('div');
        meta.className = 'meta';
        meta.appendChild(textNode(`${c.file} · ${c.duration}s`));
        if (c.drive_url) {
          const a = document.createElement('a');
          a.href = c.drive_url;
          a.target = '_blank';
          a.rel = 'noopener';
          a.textContent = 'Abrir no Drive';
          meta.appendChild(a);
        }
        item.appendChild(meta);
        if (c.instagram) item.appendChild(renderInstagram(c.instagram));
        cutsEl.appendChild(item);
      });
    }

    function renderInstagram(ig) {
      const wrap = document.createElement('div');
      wrap.className = 'ig';

      const head = document.createElement('div');
      head.className = 'ig-head';
      const label = document.createElement('strong');
      label.textContent = 'Instagram';
      const btn = document.createElement('button');
      btn.className = 'copy-btn';
      btn.textContent = 'Copiar';
      btn.addEventListener('click', () => {
        const txt = formatIgText(ig);
        navigator.clipboard.writeText(txt).then(() => {
          btn.textContent = 'Copiado!';
          btn.classList.add('ok');
          setTimeout(() => {
            btn.textContent = 'Copiar';
            btn.classList.remove('ok');
          }, 1500);
        });
      });
      head.appendChild(label);
      head.appendChild(btn);
      wrap.appendChild(head);

      const hook = document.createElement('div');
      hook.className = 'ig-hook';
      hook.textContent = ig.hook;
      wrap.appendChild(hook);

      const cap = document.createElement('div');
      cap.className = 'ig-caption';
      cap.textContent = ig.caption;
      wrap.appendChild(cap);

      const cta = document.createElement('div');
      cta.className = 'ig-cta';
      cta.textContent = ig.cta;
      wrap.appendChild(cta);

      const tags = document.createElement('div');
      tags.className = 'ig-tags';
      tags.textContent = (ig.hashtags || []).join(' ');
      wrap.appendChild(tags);

      return wrap;
    }

    function formatIgText(ig) {
      const tags = (ig.hashtags || []).join(' ');
      return `${ig.hook}\n\n${ig.caption}\n\n${ig.cta}\n\n${tags}\n`;
    }

    function textNode(t) { return document.createTextNode(t); }

    // Drag & drop
    ['dragenter', 'dragover'].forEach((evt) => {
      dropzone.addEventListener(evt, (e) => {
        e.preventDefault();
        if (!processing) dropzone.classList.add('hover');
      });
    });
    ['dragleave', 'drop'].forEach((evt) => {
      dropzone.addEventListener(evt, (e) => {
        e.preventDefault();
        dropzone.classList.remove('hover');
      });
    });
    dropzone.addEventListener('drop', (e) => {
      const file = e.dataTransfer.files[0];
      if (file) startUpload(file);
    });
    dropzone.addEventListener('click', () => {
      if (!processing) picker.click();
    });
    picker.addEventListener('change', () => {
      if (picker.files[0]) startUpload(picker.files[0]);
    });

    // Startup status (warnings)
    fetch('/api/status').then((r) => r.json()).then((s) => {
      (s.warnings || []).forEach((w) => setBanner('warn', w));
    });

    document.getElementById('shutdown').addEventListener('click', () => {
      if (!confirm('Encerrar o app?')) return;
      fetch('/shutdown', { method: 'POST' });
      setTimeout(() => { document.body.innerHTML = '<main><h1>App encerrado.</h1></main>'; }, 400);
    });
  </script>
</body>
</html>
